# Configuração Nginx — serve o frontend React e faz proxy reverso para o backend
server {
    listen 80;
    server_name localhost;

    # Serve arquivos estáticos do build React
    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso para a API do backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check do backend (proxy)
    location /health {
        proxy_pass http://backend:3000/health;
    }

    # SPA fallback — redireciona todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
