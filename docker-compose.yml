services:
  backend:
    build: ./backend
    container_name: insightreview-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/app/data/insightreview.db
      - JWT_SECRET=${JWT_SECRET:-insightreview-secret-mude-em-producao}
    volumes:
      # Persiste o banco SQLite entre restarts
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build: ./frontend
    container_name: insightreview-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
